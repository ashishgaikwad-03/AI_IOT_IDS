# Server Configuration
server.port=8080

# Application Name
spring.application.name=ids-backend

# Enable async task scheduling (required for @Scheduled in SimulationService)
spring.task.scheduling.pool.size=2

# Jackson — serialize LocalDateTime as ISO-8601 string (not array)
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss.SSS

# Logging — show INFO level for IDS classes, WARN for Spring internals
logging.level.com.ids=INFO
logging.level.org.springframework.web.socket=WARN
logging.level.org.springframework.messaging=WARN

# CORS (permissive for local dev — tighten for production)
# Actual CORS config is in WebSocketConfig.java (setAllowedOriginPatterns)
